# configs/queries.yaml
# Query registry = the ONLY read API surface for GMEE P0 (Variant A)
# Anti-drift: params here MUST match placeholders in queries/*.sql 1:1 (no extras).

functions:
  profile_query:
    sql: "queries/01_profile_query.sql"
    params: [chain, wallet]

  routing_query:
    sql: "queries/02_routing_query.sql"
    params: [chain]

  microticks_window:
    sql: "queries/03_microticks_window.sql"
    params: [chain, trade_id, window_s]

  glue_select:
    sql: "queries/04_glue_select.sql"
    # Order matches first-appearance placeholder order in SQL (unique).
    params:
      - chain
      - trade_id
      - min_hold_sec
      - mode_u_max_sec
      - mode_s_max_sec
      - mode_m_max_sec
      - margin_mult
      - max_hold_sec
      - epsilon_pad_ms
      - epsilon_min_ms
      - epsilon_max_ms
      - aggr_u_up_pct
      - aggr_s_up_pct
      - aggr_m_up_pct
      - aggr_l_up_pct
      - aggr_u_window_s
      - aggr_s_window_s
      - aggr_m_window_s
      - aggr_l_window_s
      - microticks_window_s
